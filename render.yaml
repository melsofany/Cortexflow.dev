services:
  # ── API Server (Node.js) ─────────────────────────────────────────────────────
  - type: web
    name: cortexflow-api
    runtime: node
    repo: https://github.com/melsofany/Cortexflow-dev
    branch: master
    buildCommand: >-
      npm install -g pnpm@10 &&
      pnpm install --frozen-lockfile &&
      npx playwright install chromium --with-deps &&
      (pnpm --filter @workspace/api-zod build || true) &&
      pnpm --filter @workspace/api-server build
    startCommand: "node artifacts/api-server/dist/index.cjs"
    healthCheckPath: /api/healthz
    plan: starter
    region: oregon
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: AGENT_SERVICE_URL
        value: https://cortexflow-agent.onrender.com
      - key: OLLAMA_URL
        value: http://localhost:11434
      - key: RENDER
        value: "true"
      - key: DEEPSEEK_API_KEY
        sync: false

  # ── Python Agent Service ─────────────────────────────────────────────────────
  - type: web
    name: cortexflow-agent
    runtime: python
    repo: https://github.com/melsofany/Cortexflow-dev
    branch: master
    buildCommand: >-
      apt-get update -qq &&
      (apt-get install -y chromium chromium-driver || apt-get install -y chromium-browser || true) &&
      pip install -r artifacts/agent-service/requirements.txt
    startCommand: "python artifacts/agent-service/main.py"
    healthCheckPath: /health
    plan: starter
    region: oregon
    envVars:
      - key: AGENT_SERVICE_PORT
        value: "10000"
      - key: OLLAMA_URL
        value: http://localhost:11434
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DEEPSEEK_API_KEY
        sync: false

  # ── Frontend (Static) ────────────────────────────────────────────────────────
  - type: static
    name: cortexflow-web
    repo: https://github.com/melsofany/Cortexflow-dev
    branch: master
    buildCommand: >-
      npm install -g pnpm@10 &&
      pnpm install --frozen-lockfile &&
      (pnpm --filter @workspace/api-zod build || true) &&
      BASE_PATH=/ PORT=3000 NODE_ENV=production pnpm --filter @workspace/cortexflow build
    staticPublishPath: artifacts/cortexflow/dist/public
    envVars:
      - key: BASE_PATH
        value: /
      - key: PORT
        value: "3000"
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://cortexflow-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
