kind = "web"
previewPath = "/"
title = "CortexFlow AI Agent"
version = "1.0.0"
id = "artifacts/cortexflow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18188
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/cortexflow run dev"

[services.env]
PORT = "18188"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/cortexflow", "run", "build"]
publicDir = "artifacts/cortexflow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
